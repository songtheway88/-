            - paragraph [ref=e45]: 7호선 남성역 초역세권과 강남 10분대 프리미엄, 합리적인 분양가까지
          - generic [ref=e46]:
            - heading "PROJECT OVERVIEW" [level=2] [ref=e47]
            - generic [ref=e48]:
              - paragraph [ref=e49]: 안녕하세요. 동작구 사당동의 새로운 랜드마크로 떠오르고 있는 7호선 초역세권 대단지, 남성역 해머튼 모델하우스의 최신 공급 소식을 전해드립니다.
              - paragraph [ref=e50]: 서울시 동작구 사당동 일원에 조성되는 본 현장은 지하 4층부터 지상 최고 29층 규모로 지어지며, 실거주자와 투자자 모두에게 가장 선호도 높은 59㎡, 84㎡ 중소형 인기 평형으로 알차게 구성됩니다. 최근 서울 주요 도심의 신축 아파트 공급이 부족한 가운데, 내 집 마련의 꿈을 실현할 수 있는 절호의 기회로 평가받고 있습니다.
            - img "남성역 해머튼 모델하우스 건축 투시도" [ref=e51]
          - generic [ref=e52]:
            - heading "왜 '남성역 해머튼'을 선택해야 할까요?" [level=2] [ref=e53]
            - generic [ref=e54]:
              - paragraph [ref=e55]: 수많은 부동산 현장 중에서도 유독 남성역 해머튼에 수요자들의 발길이 끊이지 않는 이유는 명확합니다. 완벽한 생활 인프라와 폭발적인 미래 가치를 동시에 품고 있기 때문입니다.
              - paragraph [ref=e56]:
                - text: ■ 압도적인 시세차익 기대감 (분양가 경쟁력)
                - text: 최근 천정부지로 솟고 있는 서울 아파트 분양가 속에서, 남성역 해머튼 분양가는 주변 사당동 기입주 아파트 시세 대비 상당히 합리적이고 파격적인 공급가로 책정되었습니다. 이는 입주 시점에 주변 시세와 키맞추기를 하며 높은 프리미엄(안전 마진)으로 직결될 수밖에 없는 강력한 장점입니다.
              - paragraph [ref=e57]:
                - text: ■ 규제 프리, 부담 없는 내 집 마련
                - text: 청약 통장이 필요 없고, 만 19세 이상이라면 누구나 접근 가능합니다. 까다로운 가점제나 치열한 청약 경쟁 없이 로얄동·로얄층을 선점할 수 있다는 점은 실수요자에게 엄청난 메리트입니다.
          - generic [ref=e58]:
            - heading "강남을 더 빠르게, 완벽한 입지환경" [level=2] [ref=e59]
            - generic [ref=e60]:
              - paragraph [ref=e61]: 부동산의 가치는 첫째도 입지, 둘째도 입지입니다. 남성역 해머튼은 교통, 교육, 생활, 자연까지 4박자를 모두 갖춘 올인빌(All-in-Vill) 프리미엄을 자랑합니다.
              - paragraph [ref=e62]:
                - text: 1. 강남 출퇴근 10분대 초역세권 교통망
                - text: 단지에서 도보로 이용 가능한 7호선 남성역을 통해 강남구청, 논현, 고속터미널 등 강남 핵심 업무지구까지 10분대에 도달합니다. 또한, 서리풀터널 개통으로 서초역, 교대역, 강남역으로의 차량 이동이 획기적으로 단축되어 완벽한 '강남 생활권'을 누릴 수 있습니다.
              - paragraph [ref=e63]:
                - text: 2. 도보 통학 안심 학세권
                - text: 자녀를 둔 학부모님들이 가장 먼저 체크하시는 학군 역시 우수합니다. 남성초등학교, 사당중학교, 동작고등학교 등 초, 중, 고교가 모두 도보권에 위치해 있으며, 방배동 및 반포 학원가와도 인접해 최상의 교육 환경을 제공합니다.
              - paragraph [ref=e64]:
                - text: 3. 쾌적한 숲세권과 원스톱 생활 인프라
                - text: 까치산공원, 국립서울현충원, 한강공원 등이 가까워 도심 속에서도 쾌적한 힐링 라이프를 즐길 수 있습니다. 이마트, 이수역 상권, 신세계백화점(강남점) 등 풍부한 생활 편의시설도 편리하게 이용 가능합니다.
