              - generic [ref=e891]: <description>
              - generic [ref=e893]: "<![CDATA[ &lt;div class=&quot;xe_content&quot;&gt;&lt;div style=&quot;max-width: 960px; margin: 0 auto; font-family: &#039;Apple SD Gothic Neo&#039;, &#039;Malgun Gothic&#039;, &#039;Dotum&#039;, sans-serif; color: #222; line-height: 1.8; letter-spacing: -0.03em; background-color: #fff; padding: 40px 20px;&quot;&gt; &lt;header style=&quot;text-align: center; margin-bottom: 60px; border-bottom: 3px solid #003366; padding-bottom: 30px;&quot;&gt; &lt;h1 style=&quot;font-size: 42px; font-weight: 900; margin: 0px 0px 20px; color: rgb(0, 51, 102); line-height: 1.3; text-align: left;&quot;&gt;남성역 해머튼&lt;br /&gt; &lt;span style=&quot;font-size:36px;&quot;&gt;&lt;span style=&quot;color: #d9534f;&quot;&gt;공급가 및 모델하우스&lt;/span&gt;&lt;/span&gt;&lt;/h1&gt; &lt;p style=&quot;font-size: 22px; color: rgb(85, 85, 85); font-weight: 500; text-align: left;&quot;&gt;&lt;span style=&quot;font-size:22px;&quot;&gt;서울 동작구 &lt;strong&gt;7호선 초역세권 39층 랜드마크&nbsp;&lt;/strong&gt;주변 시세 대비 &lt;strong&gt;반값(6억 대~)&lt;/strong&gt;으로 소유하십시오.&lt;/span&gt;&lt;/p&gt; &lt;/header&gt; &lt;div style=&quot;margin-bottom: 50px; text-align: center; padding: 0 40px;&quot;&gt; &lt;p style=&quot;font-size: 20px; color: rgb(51, 51, 51); word-break: keep-all; text-align: left;&quot;&gt;안녕하세요. 서울 집값 상승세 속에서 &lt;strong&gt;동작구 사당동&lt;/strong&gt;이 다시 주목받고 있습니다.&lt;/p&gt; &lt;p style=&quot;font-size: 20px; color: rgb(51, 51, 51); word-break: keep-all; text-align: left;&quot;&gt;&nbsp;&lt;/p&gt; &lt;p style=&quot;font-size: 20px; color: rgb(51, 51, 51); word-break: keep-all; text-align: left;&quot;&gt;&lt;img src=&quot;https://kurof.co.kr/./files/attach/images/514/522/79bf7f4eb072535fa95eadeff4a599b0.png&quot; alt=&quot;남성역-해머튼-분양가-모델하우스.png&quot; style=&quot;&quot; /&gt;&lt;/p&gt; &lt;p style=&quot;text-align: left;&quot;&gt;&nbsp;&lt;/p&gt; &lt;p style=&quot;font-size: 20px; color: rgb(51, 51, 51); word-break: keep-all; text-align: left;&quot;&gt;&lt;br /&gt; 강남 생활권을 누리면서도 전세가 수준으로 내 집 마련이 가능한&lt;br /&gt; &lt;strong&gt;&#39;남성역 해머튼&#39;&lt;/strong&gt;의 핵심 정보를 큰 화면으로 정리해 드립니다.&lt;/p&gt; &lt;/div&gt; &lt;figure style=&quot;margin: 0 0 60px 0; text-align: center;&quot;&gt; &lt;p style=&quot;text-align: left;&quot;&gt;&lt;img alt=&quot;남성역 해머튼 25평형 아파트 평면도&quot; src=&quot;https://kurof.co.kr/./files/attach/images/514/522/199a0f8d0647c2269caf514714f6b654.jpg&quot; style=&quot;width: 100%; max-width: 900px; height: auto; border: 1px solid #eee; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1);&quot; /&gt;&lt;/p&gt; &lt;figcaption style=&quot;margin-top: 15px; font-size: 18px; color: #666; font-weight: bold;&quot;&gt; &lt;p style=&quot;text-align: left;&quot;&gt;▲ 4Bay 판상형 구조가 적용된 59㎡(25평) 평면 설계&lt;/p&gt; &lt;/figcaption&gt; &lt;/figure&gt; &lt;div style=&quot;background-color: #f4f8fb; padding: 50px 40px; border-radius: 20px; margin-bottom: 60px; border: 1px solid #dcebf5;&quot;&gt; &lt;h3 style=&quot;font-size: 30px; color: rgb(0, 51, 102); margin-top: 0px; margin-bottom: 30px; font-weight: 800;&quot;&gt;왜 &#39;남성역 해머튼&#39;인가? &lt;span style=&quot;color:#d9534f;&quot;&gt;BEST 3&lt;/span&gt;&lt;/h3&gt; &lt;div style=&quot;font-size: 20px; color: #444;&quot;&gt; &lt;div style=&quot;margin-bottom: 25px; display: flex; align-items: flex-start;&quot;&gt; &lt;div&gt;&lt;strong style=&quot;font-size: 22px; color: #222;&quot;&gt;강남 10분대 쾌속 교통망&lt;/strong&gt;&lt;br /&gt; 7호선 남성역 도보 1분 초역세권 + 이수역(4/7호선) 더블 역세권의 혜택&lt;/div&gt; &lt;/div&gt; &lt;div style=&quot;margin-bottom: 25px; display: flex; align-items: flex-start;&quot;&gt; &lt;div&gt;&lt;strong style=&quot;font-size: 22px; color: #222;&quot;&gt;서울에서 찾기 힘든 6억 대~&lt;/strong&gt;&lt;br /&gt; 인근 시세(14억 대) 대비 압도적인 가격 경쟁력으로 높은 시세차익 기대&lt;/div&gt; &lt;/div&gt; &lt;div style=&quot;display: flex; align-items: flex-start;&quot;&gt; &lt;div&gt;&lt;strong style=&quot;font-size: 22px; color: #222;&quot;&gt;2천만 원 상당 가전 풀옵션&lt;/strong&gt;&lt;br /&gt; 시스템에어컨, 세탁기, 건조기, 식기세척기 등 무상 제공 (선착순)&lt;/div&gt; &lt;/div&gt; &lt;/div&gt; &lt;/div&gt; &lt;figure style=&quot;margin: 0 0 60px 0; text-align: center;&quot;&gt; &lt;p style=&quot;text-align: left;&quot;&gt;&lt;img alt=&quot;남성역 해머튼 타입별 공급가표&quot; src=&quot;https://kurof.co.kr/./files/attach/images/514/522/e7e2f66b42efbf235c2b0c5959a95b6f.jpg&quot; style=&quot;width: 100%; max-width: 900px; height: auto; border: 1px solid #eee; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1);&quot; /&gt;&lt;/p&gt; &lt;figcaption style=&quot;margin-top: 15px; font-size: 18px; color: #666; font-weight: bold;&quot;&gt; &lt;p style=&quot;text-align: left;&quot;&gt;▲ 타입별 공급가 상세표 (PC 화면에서 크게 확인하세요)&lt;/p&gt; &lt;/figcaption&gt; &lt;/figure&gt; &lt;div style=&quot;text-align: center; margin-bottom: 40px;&quot;&gt; &lt;p style=&quot;font-size: 24px; font-weight: bold; color: rgb(217, 83, 79); margin-bottom: 10px; text-align: left;&quot;&gt;※ 현재 로얄층 잔여 세대가 빠르게 소진 중입니다.&lt;/p&gt; &lt;p style=&quot;font-size: 20px; color: rgb(85, 85, 85); margin-bottom: 40px; text-align: left;&quot;&gt;모델하우스는 &lt;strong&gt;담당 예약제&lt;/strong&gt;로 운영되오니,&lt;br /&gt; 방문 전 아래 대표번호로 전화 주시면 주소와 주차장을 안내해 드립니다.&lt;/p&gt; &lt;p style=&quot;font-size: 20px; color: rgb(85, 85, 85); margin-bottom: 40px; text-align: left;&quot;&gt;&lt;a href=&quot;tel:1800-1390&quot;&gt;&lt;img src=&quot;https://kurof.co.kr/./files/attach/images/514/522/fbd126c4659dc6cd855571ae5805628c.png&quot; alt=&quot;남성역 해머튼 모델하우스.png&quot; style=&quot;&quot; /&gt;&lt;/a&gt;&lt;/p&gt; &lt;p style=&quot;font-size: 20px; color: rgb(85, 85, 85); margin-bottom: 40px; text-align: left;&quot;&gt;&nbsp;&lt;/p&gt; &lt;/div&gt; &lt;/div&gt;&lt;/div&gt; ]]>"
