              - generic [ref=e599]: <![CDATA[ 동작구 랜드마크 &amp;apos;남성역 해머튼&amp;apos; 59㎡/84㎡ 선착순 동호지정 시작 ]]>
              - generic [ref=e601]: </title>
            - generic [ref=e602]:
              - generic [ref=e605]: <dc:creator>
