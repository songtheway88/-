              - generic [ref=e765]: "<![CDATA[ &lt;div class=&quot;xe_content&quot;&gt;&lt;div id=&quot;hammerton-board-qna&quot; style=&quot;max-width: 800px; margin: 0 auto; background: #fff; font-family: &#039;Noto Sans KR&#039;, &#039;Malgun Gothic&#039;, sans-serif; color: #333;&quot;&gt; &lt;style type=&quot;text/css&quot;&gt;/* 게시판 전용 스타일 (충돌 방지) */ #hammerton-board-qna * { box-sizing: border-box; word-break: keep-all; letter-spacing: -0.5px; line-height: 1.6; } #hammerton-board-qna a { text-decoration: none; } #hammerton-board-qna img { max-width: 100%; display: block; margin: 0 auto; } /* 타이틀 영역 */ .qna-header { text-align: center; padding: 40px 20px 30px; border-bottom: 2px solid #102a43; margin-bottom: 30px; } .qna-tit { font-size: 28px; font-weight: 900; color: #102a43; margin: 0 0 10px 0; } .qna-sub { font-size: 16px; color: #666; font-weight: 500; } /* 질문 박스 스타일 */ .qna-box { background: #fdfdfd; border: 1px solid #e0e0e0; border-radius: 12px; padding: 25px; margin-bottom: 20px; } .qna-q { font-size: 19px; font-weight: bold; color: #102a43; margin-bottom: 12px; padding-left: 28px; position: relative; } .qna-q::before { content: &quot;Q.&quot;; color: #c0392b; position: absolute; left: 0; top: 0; font-size: 22px; } .qna-a { font-size: 16px; color: #444; padding-left: 28px; border-top: 1px dashed #ddd; padding-top: 15px; } .txt-point { color: #c0392b; font-weight: bold; background: rgba(192, 57, 43, 0.08); padding: 2px 6px; border-radius: 4px; } /* 하단 안내 및 버튼 */ .qna-footer { text-align: center; padding: 40px 20px; background: #f8f9fa; border-radius: 12px; margin-top: 40px; } .btn-call { display: inline-block; background: #102a43; color: #fff !important; font-size: 18px; font-weight: bold; padding: 15px 40px; border-radius: 50px; margin-top: 20px; transition: 0.3s; } .btn-call:hover { background: #c0392b; } /* 모바일 글자 크기 조정 */ @media (max-width: 600px) { .qna-tit { font-size: 24px; } .qna-q { font-size: 17px; } .qna-a { font-size: 15px; padding-left: 0; } .btn-call { width: 100%; } } &lt;/style&gt; &lt;div class=&quot;qna-header&quot;&gt; &lt;h2 class=&quot;qna-tit&quot;&gt;남성역 해머튼 자주 묻는 질문&lt;/h2&gt; &lt;p class=&quot;qna-sub&quot;&gt;자격조건부터 가격까지, 궁금증을 해결해 드립니다.&lt;/p&gt; &lt;/div&gt; &lt;div class=&quot;qna-box&quot;&gt; &lt;div class=&quot;qna-q&quot;&gt;자격 조건은 누구나 되나요?&lt;/div&gt; &lt;div class=&quot;qna-a&quot;&gt;서울, 경기, 인천 지역에 &lt;span class=&quot;txt-point&quot;&gt;6개월 이상 거주한 세대주&lt;/span&gt;라면 신청 가능합니다.&lt;br /&gt; 무주택자이거나, 전용 85㎡ 이하 주택 1채를 소유하신 분도 가능합니다. (상세 자격은 전화 주시면 무료로 조회해 드립니다.)&lt;/div&gt; &lt;/div&gt; &lt;div class=&quot;qna-box&quot;&gt; &lt;div class=&quot;qna-q&quot;&gt;청약 통장이 없어도 되나요?&lt;/div&gt; &lt;div class=&quot;qna-a&quot;&gt;네, &lt;strong&gt;청약 통장은 필요 없습니다.&lt;/strong&gt;&lt;br /&gt; 청약 경쟁이나 가점제 방식이 아니라, 오시는 순서대로 원하는 동/호수를 직접 선택하는 &lt;span class=&quot;txt-point&quot;&gt;선착순 동호지정&lt;/span&gt; 방식입니다.&lt;/div&gt; &lt;/div&gt; &lt;div class=&quot;qna-box&quot;&gt; &lt;div class=&quot;qna-q&quot;&gt;가격은 얼마인가요?&lt;/div&gt; &lt;div class=&quot;qna-a&quot;&gt;현재 &lt;span class=&quot;txt-point&quot;&gt;59㎡(25평) 기준 6억 원대&lt;/span&gt;부터 시작합니다.&lt;br /&gt; 인근 사당동 신축 시세(약 14억~) 대비 절반 수준의 가격 경쟁력을 갖추고 있어 높은 시세 차익이 기대됩니다.&lt;/div&gt; &lt;/div&gt; &lt;div class=&quot;qna-box&quot;&gt; &lt;div class=&quot;qna-q&quot;&gt;모델하우스 방문은 어떻게 하나요?&lt;/div&gt; &lt;div class=&quot;qna-a&quot;&gt;혼잡 방지를 위해 &lt;strong&gt;담당 예약제&lt;/strong&gt;로 운영됩니다.&lt;br /&gt; 출발 전 아래 대표번호로 전화 주시면 &lt;span class=&quot;txt-point&quot;&gt;주차 안내 및 오시는 길&lt;/span&gt; 문자를 발송해 드립니다.&lt;/div&gt; &lt;/div&gt; &lt;div class=&quot;qna-footer&quot;&gt; &lt;h3 style=&quot;font-size: 22px; font-weight: bold; color: #333; margin-bottom: 20px;&quot;&gt;로얄층 잔여세대 실시간 확인&lt;/h3&gt; &lt;a href=&quot;tel:1800-1390&quot;&gt;&lt;img alt=&quot;남성역 해머튼 대표번호 1800-1390&quot; src=&quot;https://kurof.co.kr/./files/attach/images/527/527/e1d85a865d3cc5a2e917cf1b85bfc6ed.PNG&quot; style=&quot;max-width: 400px; width: 100%;&quot; /&gt;&lt;/a&gt;&lt;/div&gt; &lt;/div&gt;&lt;/div&gt; ]]>"
