            - generic [ref=e620]:
              - generic [ref=e623]: <description>
              - generic [ref=e625]: "<![CDATA[ &lt;div class=&quot;xe_content&quot;&gt;&lt;p data-path-to-node=&quot;11&quot;&gt;&lt;span style=&quot;font-size:22px;&quot;&gt;&lt;b data-index-in-node=&quot;0&quot; data-path-to-node=&quot;11&quot;&gt;[부동산/분양 이슈] 동작구 사당동 7호선 초역세권 신축 아파트 공급&lt;/b&gt;&lt;/span&gt;&lt;/p&gt; &lt;p data-path-to-node=&quot;12&quot;&gt;&lt;span style=&quot;font-size:22px;&quot;&gt;서울 아파트 전세가가 연일 상승하는 가운데, 강남 접근성이 뛰어난 동작구 사당동 일대에 파격적인 공급가를 내세운 신축 아파트가 등장해 실수요자들의 이목이 쏠리고 있다.&lt;/span&gt;&lt;/p&gt; &lt;p data-path-to-node=&quot;13&quot;&gt;&lt;span style=&quot;font-size:22px;&quot;&gt;7호선 남성역 초역세권 입지에 들어서는 **&#39;(가칭)남성역 해머튼&#39;**이 그 주인공이다.&lt;/span&gt;&lt;/p&gt; &lt;p data-path-to-node=&quot;13&quot;&gt;&nbsp;&lt;/p&gt; &lt;p data-path-to-node=&quot;14&quot;&gt;&lt;span style=&quot;font-size:22px;&quot;&gt;&lt;b data-index-in-node=&quot;0&quot; data-path-to-node=&quot;14&quot;&gt;◆ 주변 시세 대비 약 40% 저렴... &quot;확실한 시세 차익 기대&quot;&lt;/b&gt; 부동산 업계에 따르면, 현재 사당동 일대 신축 아파트(래미안 이수역 로이파크 등)의 전용 59㎡ 매매 호가는 약 14억 원~15억 원 선에 형성되어 있다.&lt;/span&gt;&lt;/p&gt; &lt;p data-path-to-node=&quot;15&quot;&gt;&lt;span style=&quot;font-size:22px;&quot;&gt;반면, &lt;b data-index-in-node=&quot;4&quot; data-path-to-node=&quot;15&quot;&gt;&#39;남성역 해머튼&#39;의 공급가는 전용 59㎡ 기준 6억 원대&lt;/b&gt;부터 시작한다. 이는 주변 전세가보다도 낮은 수준으로, 입주 시 약 **6~8억 원 가량의 시세 차익(프리미엄)**이 발생할 것으로 부동산 전문가들은 분석하고 있다.&lt;/span&gt;&lt;/p&gt; &lt;p data-path-to-node=&quot;15&quot;&gt;&nbsp;&lt;/p&gt; &lt;p data-path-to-node=&quot;16&quot;&gt;&lt;span style=&quot;font-size:22px;&quot;&gt;&lt;b data-index-in-node=&quot;0&quot; data-path-to-node=&quot;16&quot;&gt;◆ 강남 10분대 쾌속 교통망과 학세권 갖춰&lt;/b&gt; 단지는 7호선 남성역을 도보로 이용할 수 있는 초역세권 입지로, 논현&middot;강남구청&middot;고속터미널 등 강남 주요 업무지구까지 환승 없이 10분대에 이동 가능하다. 또한, 서리풀터널 개통으로 서초동 대법원 및 법조타운으로의 차량 접근성도 획기적으로 개선되었다.&lt;/span&gt;&lt;/p&gt; &lt;p data-path-to-node=&quot;16&quot;&gt;&nbsp;&lt;/p&gt; &lt;p data-path-to-node=&quot;17&quot;&gt;&lt;span style=&quot;font-size:22px;&quot;&gt;교육 환경 또한 우수하다. 단지 인근에 남성초, 사당중, 동작고가 위치해 있어 도보 통학이 가능한 &#39;안심 학세권&#39;을 형성하고 있으며, 사당동 학원가 및 방배동 학원가 이용도 편리하다.&lt;/span&gt;&lt;/p&gt; &lt;p data-path-to-node=&quot;17&quot;&gt;&nbsp;&lt;/p&gt; &lt;p data-path-to-node=&quot;18&quot;&gt;&lt;span style=&quot;font-size:22px;&quot;&gt;&lt;b data-index-in-node=&quot;0&quot; data-path-to-node=&quot;18&quot;&gt;◆ 4Bay 혁신 설계 및 풀옵션 무상 혜택&lt;/b&gt; 남성역 해머튼은 실수요자의 선호도가 가장 높은 중소형 평형(59㎡, 84㎡) 위주로 구성된다. 전 세대 남향 위주 배치와 4Bay 판상형 설계를 적용해 채광과 통풍을 극대화했으며, 팬트리와 드레스룸 등 넉넉한 수납공간을 제공한다.&lt;/span&gt;&lt;/p&gt; &lt;p data-path-to-node=&quot;18&quot;&gt;&nbsp;&lt;/p&gt; &lt;p data-path-to-node=&quot;19&quot;&gt;&lt;span style=&quot;font-size:22px;&quot;&gt;조합 관계자는 &quot;시행사 이익을 배제한 지역주택조합 방식으로 진행되어 서울 도심에서 보기 드문 6억 원대 가격을 맞출 수 있었다&quot;며 &quot;현재 로얄층 위주로 문의가 빗발치고 있어 조기 마감이 예상된다&quot;고 전했다.&lt;/span&gt;&lt;/p&gt; &lt;p data-path-to-node=&quot;20&quot;&gt;&lt;span style=&quot;font-size:22px;&quot;&gt;현재 **&#39;남성역 해머튼&#39;**은 주택홍보관을 개관하고 &lt;b data-index-in-node=&quot;30&quot; data-path-to-node=&quot;20&quot;&gt;선착순 동호지정 계약&lt;/b&gt;을 진행 중이다. 홍보관은 혼잡 방지를 위해 100% 방문 예약제로 운영되며, 대표번호를 통해 예약 후 방문하면 대기 없이 관람 및 상담이 가능하다.&lt;/span&gt;&lt;/p&gt; &lt;p data-path-to-node=&quot;20&quot;&gt;&nbsp;&lt;/p&gt; &lt;p data-path-to-node=&quot;21&quot;&gt;&lt;span style=&quot;font-size:22px;&quot;&gt;&lt;b data-index-in-node=&quot;0&quot; data-path-to-node=&quot;21&quot;&gt;[문의] 남성역 해머튼 모델하우스 : 1800-1390&lt;/b&gt;&lt;/span&gt;&lt;/p&gt;&lt;/div&gt; ]]>"
              - generic [ref=e627]: </description>
