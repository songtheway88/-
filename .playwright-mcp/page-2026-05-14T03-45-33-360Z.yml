            - generic [ref=e118]:
              - generic [ref=e121]: <title>
              - generic [ref=e123]: <![CDATA[ 남성역 해머튼 사업개요 ]]>
              - generic [ref=e125]: </title>
            - generic [ref=e126]:
              - generic [ref=e129]: <dc:creator>
              - generic [ref=e131]: <![CDATA[ 남성역 해머튼 ]]>
              - generic [ref=e133]: </dc:creator>
            - generic [ref=e134]:
              - generic [ref=e135]: <link>
              - text: https://kurof.co.kr/sadang/701
              - generic [ref=e136]: </link>
            - generic [ref=e137]:
              - generic [ref=e138]:
                - text: <guid
                - generic [ref=e139]: isPermaLink="true"
                - text: ">"
              - text: https://kurof.co.kr/sadang/701
              - generic [ref=e140]: </guid>
            - generic [ref=e141]:
              - generic [ref=e142]: <comments>
              - text: https://kurof.co.kr/sadang/701#comment
              - generic [ref=e143]: </comments>
            - generic [ref=e144]:
              - generic [ref=e147]: <description>
              - generic [ref=e149]: "<![CDATA[ &lt;div class=&quot;xe_content&quot;&gt;**남성역 해머튼(Hamer Ton)**은 서울 동작구 사당동 일대에 조성되는 대규모 주거 단지로, 현재 **지역주택조합** 방식으로 추진되고 있는 프로젝트입니다.&lt;br /&gt;&lt;br /&gt; 상세한 사업개요와 주요 정보는 다음과 같습니다.&lt;br /&gt;&lt;br /&gt; ### 1. 사업 개요&lt;br /&gt; * **사업명:** 남성역 해머튼 (동작남성역 지역주택조합)&lt;br /&gt; * **위치:** 서울특별시 동작구 사당동 277-1번지 일원&lt;br /&gt; * **규모:** 지하 4층 ~ 지상 **최고 39층**, 총 6개 동&lt;br /&gt; * **세대 수:** **총 934세대** (장기전세주택 포함 / 59㎡ 478세대, 84㎡ 456세대)&lt;br /&gt; * **용도:** 아파트, 부대복리시설, 근린생활시설&lt;br /&gt; * **용적률:** 약 499.82% (준주거지역/지구단위계획구역 적용)&lt;br /&gt; * **시공사:** 현대건설 (예정)&lt;br /&gt;&lt;br /&gt; ### 2. 평형 구성 및 특징&lt;br /&gt; 전 세대 남향 위주 배치와 선호도 높은 중소형 평형대로 구성되어 있습니다.&lt;br /&gt; * **59㎡ (약 25평형):** 478세대 (3Bay/4Bay 특화 설계)&lt;br /&gt; * **84㎡ (약 34평형):** 456세대&lt;br /&gt; * **특장점:** 풀옵션 가전(시스템 에어컨, 냉장고, 세탁기, 건조기, 식기세척기 등) 무상 제공 혜택이 강조되고 있습니다.&lt;br /&gt;&lt;br /&gt; ### 3. 단지 내 주요 시설&lt;br /&gt; * **커뮤니티:** 피트니스 센터, 실내 골프연습장, 작은 도서관, 경로당, 어린이집 등&lt;br /&gt; * **안전/편의:** 지상에 차가 없는 단지 조성, 키즈스테이션(드롭존), 넉넉한 동간 거리 확보를 통한 조망권 및 통풍 최적화&lt;br /&gt;&lt;br /&gt; ### 4. 마케팅 및 투자 포인트&lt;br /&gt; * **가격 경쟁력:** 지역주택조합 사업 특성상 일반 분양 아파트 대비 저렴한 공급가(3.3㎡당 2천만 원대 후반~3천만 원대 초반 형성 추세)가 가장 큰 메리트입니다.&lt;br /&gt;&lt;br /&gt; * **미래 가치:** 남성역 역세권 개발 사업의 중심지에 위치하며, 사당/이수 일대의 대규모 주거 타운 변화와 서리풀 터널 개통으로 인한 강남 접근성 확대가 핵심 호재입니다.&lt;br /&gt;&lt;br /&gt; * **시행 및 자금관리:** 동작남성역 지주택조합 추진위원회 시행, **우리자산신탁** 자금관리로 안전성을 높이고 있습니다.&lt;/div&gt; ]]>"
              - generic [ref=e151]: </description>
            - generic [ref=e152]:
              - generic [ref=e153]: <pubDate>
