            - generic [ref=e820]:
              - generic [ref=e823]: <description>
              - generic [ref=e825]: "<![CDATA[ &lt;div class=&quot;xe_content&quot;&gt;&lt;h2&gt;&lt;span style=&quot;font-size:24px;&quot;&gt;남성역 헤머튼 개요&lt;/span&gt;&lt;/h2&gt; &lt;p&gt;&lt;img alt=&quot;남성역 해머튼.jpg&quot; src=&quot;https://kurof.co.kr/./files/attach/images/514/539/3a36e461ee99ab16e3f5ea0a08ded984.jpg&quot; /&gt;&lt;/p&gt; &lt;p&gt;&nbsp;&lt;/p&gt; &lt;p&gt;&nbsp;&lt;/p&gt; &lt;p&gt;&lt;span style=&quot;font-size:24px;&quot;&gt;&lt;strong&gt;위치&lt;/strong&gt;&lt;/span&gt;&lt;/p&gt; &lt;ul&gt; &lt;li&gt; &lt;p&gt;&lt;span style=&quot;font-size:24px;&quot;&gt;&lt;strong&gt;서울특별시 동작구 사당동 277-1 일원&lt;/strong&gt; (지하철 7호선 &lt;em&gt;남성역&lt;/em&gt; 도보 약 3분 거리)&lt;/span&gt;&lt;/p&gt; &lt;/li&gt; &lt;li&gt; &lt;p&gt;&lt;span style=&quot;font-size:24px;&quot;&gt;&lt;em&gt;이수역&lt;/em&gt; (4&middot;7호선) 도보 약 10분 거리로 &lt;strong&gt;더블역세권&lt;/strong&gt; 입지 확보&lt;/span&gt;&lt;/p&gt; &lt;/li&gt; &lt;/ul&gt; &lt;p&gt;&lt;span style=&quot;font-size:24px;&quot;&gt;&lt;strong&gt;단지 규모&lt;/strong&gt;&lt;/span&gt;&lt;/p&gt; &lt;ul&gt; &lt;li&gt; &lt;p&gt;&lt;span style=&quot;font-size:24px;&quot;&gt;&lt;strong&gt;총 934세대&lt;/strong&gt;, 지하 4층~지상 39층, 6개 동&lt;/span&gt;&lt;/p&gt; &lt;/li&gt; &lt;li&gt; &lt;p&gt;&lt;span style=&quot;font-size:24px;&quot;&gt;전용면적 구성: &lt;strong&gt;59㎡&middot;84㎡형 중심&lt;/strong&gt; (중소형)&lt;/span&gt;&lt;/p&gt; &lt;/li&gt; &lt;/ul&gt; &lt;p&gt;&lt;span style=&quot;font-size:24px;&quot;&gt;시행 방식&lt;/span&gt;&lt;/p&gt; &lt;ul&gt; &lt;li&gt; &lt;p&gt;&lt;span style=&quot;font-size:24px;&quot;&gt;&lt;strong&gt;지역주택조합(지주택)&lt;/strong&gt; 방식으로 추진되는 단지&lt;/span&gt;&lt;/p&gt; &lt;/li&gt; &lt;/ul&gt; &lt;hr /&gt; &lt;h2&gt;&lt;span style=&quot;font-size:24px;&quot;&gt;모델하우스 (홍보관) 정보&lt;/span&gt;&lt;/h2&gt; &lt;p&gt;&lt;span style=&quot;font-size:24px;&quot;&gt;&lt;strong&gt;모델하우스 주소&lt;/strong&gt;&lt;/span&gt;&lt;/p&gt; &lt;ul&gt; &lt;li&gt; &lt;p&gt;&lt;span style=&quot;font-size:24px;&quot;&gt;&lt;strong&gt;서울시 서초구 서초동 1499-5&lt;/strong&gt; (해머튼 홍보관)&lt;/span&gt;&lt;/p&gt; &lt;/li&gt; &lt;/ul&gt; &lt;p&gt;&lt;span style=&quot;font-size:24px;&quot;&gt;&lt;strong&gt;문의 / 상담 예약 / 방문예약&lt;/strong&gt;&lt;/span&gt;&lt;/p&gt; &lt;ul&gt; &lt;li&gt; &lt;p&gt;&lt;span style=&quot;font-size:24px;&quot;&gt;전화: &lt;strong&gt;1800-1390&lt;/strong&gt;&lt;/span&gt;&lt;/p&gt; &lt;/li&gt; &lt;/ul&gt; &lt;p&gt;&lt;span style=&quot;font-size:24px;&quot;&gt;&lt;strong&gt;오픈 정보&lt;/strong&gt;&lt;/span&gt;&lt;/p&gt; &lt;ul&gt; &lt;li&gt; &lt;p&gt;&lt;span style=&quot;font-size:24px;&quot;&gt;2025년 &lt;strong&gt;10월 홍보관 오픈 예정&lt;/strong&gt;으로 안내된 바 있음&lt;br /&gt; &rArr; 방문 전 전화 또는 공식 상담으로 &lt;strong&gt;운영시간과 사전 예약&lt;/strong&gt; 확인 바랍니다.&lt;/span&gt;&lt;/p&gt; &lt;/li&gt; &lt;/ul&gt; &lt;p&gt;&nbsp;&lt;/p&gt; &lt;hr /&gt; &lt;h2&gt;&lt;span style=&quot;font-size:24px;&quot;&gt;주요 분양 조건 (조합원/분양 정보)&lt;/span&gt;&lt;/h2&gt; &lt;p&gt;&lt;span style=&quot;font-size:24px;&quot;&gt;&lt;strong&gt;분양가 (예상/초기 조건)&lt;/strong&gt;&lt;/span&gt;&lt;/p&gt; &lt;ul&gt; &lt;li&gt; &lt;p&gt;&lt;span style=&quot;font-size:24px;&quot;&gt;전용 &lt;strong&gt;59㎡ 약 6억 원대&lt;/strong&gt;, &lt;strong&gt;84㎡ 약 8억 원대&lt;/strong&gt; 시작이라는 정보가 있음 (초기 조합원 조건 기준)&lt;/span&gt;&lt;/p&gt; &lt;/li&gt; &lt;/ul&gt; &lt;p&gt;&lt;span style=&quot;font-size:24px;&quot;&gt;혜택(초기 조건 예시)&lt;/span&gt;&lt;/p&gt; &lt;ul&gt; &lt;li&gt; &lt;p&gt;&lt;span style=&quot;font-size:24px;&quot;&gt;발코니 &lt;strong&gt;무상확장&lt;/strong&gt;,&lt;/span&gt;&lt;/p&gt; &lt;/li&gt; &lt;li&gt; &lt;p&gt;&lt;span style=&quot;font-size:24px;&quot;&gt;&lt;strong&gt;중도금 무이자&lt;/strong&gt;,&lt;/span&gt;&lt;/p&gt; &lt;/li&gt; &lt;li&gt; &lt;p&gt;&lt;span style=&quot;font-size:24px;&quot;&gt;&lt;strong&gt;풀옵션 가전 기본 제공&lt;/strong&gt; (에어컨, 냉장고, 식기세척기 등) 등의 혜택이 안내된 바 있음&lt;/span&gt;&lt;/p&gt; &lt;/li&gt; &lt;/ul&gt; &lt;p&gt;&lt;span style=&quot;font-size:24px;&quot;&gt;&lt;strong&gt;자금 조건 예시&lt;/strong&gt;&lt;/span&gt;&lt;/p&gt; &lt;ul&gt; &lt;li&gt; &lt;p&gt;&lt;span style=&quot;font-size:24px;&quot;&gt;청약금 약 &lt;strong&gt;1,000만 원&lt;/strong&gt;, 정계약금 약 &lt;strong&gt;4,000만~5,000만 원&lt;/strong&gt; 수준 언급 있음 (자세한 조건은 상담 필요)&lt;/span&gt;&lt;/p&gt; &lt;/li&gt; &lt;/ul&gt; &lt;p&gt;&lt;span style=&quot;font-size:24px;&quot;&gt;⚠️ &lt;em&gt;지주택(지역주택조합)&lt;/em&gt; 특성상 실제 계약 조건 또는 비용 구성은 시점 및 조합 운영 계획에 따라 달라질 수 있습니다.&lt;/span&gt;&lt;/p&gt; &lt;hr /&gt; &lt;h2&gt;&lt;span style=&quot;font-size:24px;&quot;&gt;입지 &amp; 생활 인프라&lt;/span&gt;&lt;/h2&gt; &lt;p&gt;&lt;span style=&quot;font-size:24px;&quot;&gt;✔ &lt;strong&gt;역세권&lt;/strong&gt;&lt;/span&gt;&lt;/p&gt; &lt;ul&gt; &lt;li&gt; &lt;p&gt;&lt;span style=&quot;font-size:24px;&quot;&gt;남성역 7호선 도보 약 3분 초역세권&lt;/span&gt;&lt;/p&gt; &lt;/li&gt; &lt;li&gt; &lt;p&gt;&lt;span style=&quot;font-size:24px;&quot;&gt;이수역 4&middot;7호선 도보 약 10분 거리에 위치&lt;/span&gt;&lt;/p&gt; &lt;/li&gt; &lt;/ul&gt; &lt;p&gt;&lt;span style=&quot;font-size:24px;&quot;&gt;✔ &lt;strong&gt;교통&lt;/strong&gt;&lt;/span&gt;&lt;/p&gt; &lt;ul&gt; &lt;li&gt; &lt;p&gt;&lt;span style=&quot;font-size:24px;&quot;&gt;서리풀터널을 통한 강남&middot;서초권 접근성 양호&lt;/span&gt;&lt;/p&gt; &lt;/li&gt; &lt;li&gt; &lt;p&gt;&lt;span style=&quot;font-size:24px;&quot;&gt;남부순환로&middot;강남순환고속도로 등 주요 도로 접근 용이&lt;/span&gt;&lt;/p&gt; &lt;/li&gt; &lt;/ul&gt; &lt;p&gt;&lt;span style=&quot;font-size:24px;&quot;&gt;✔ &lt;strong&gt;생활 인프라&lt;/strong&gt;&lt;/span&gt;&lt;/p&gt; &lt;ul&gt; &lt;li&gt; &lt;p&gt;&lt;span style=&quot;font-size:24px;&quot;&gt;홈플러스, 신세계백화점, 강남성모병원, 예술의전당 등 강남권 대형 시설 이용 가능&lt;/span&gt;&lt;/p&gt; &lt;/li&gt; &lt;/ul&gt; &lt;p&gt;&lt;span style=&quot;font-size:24px;&quot;&gt;✔ &lt;strong&gt;교육환경&lt;/strong&gt;&lt;/span&gt;&lt;/p&gt; &lt;ul&gt; &lt;li&gt; &lt;p&gt;&lt;span style=&quot;font-size:24px;&quot;&gt;행림초, 남성중, 동작고 등 인근에 교육시설 밀집&lt;/span&gt;&lt;/p&gt; &lt;/li&gt; &lt;/ul&gt; &lt;p&gt;&lt;span style=&quot;font-size:24px;&quot;&gt;✔ &lt;strong&gt;주변 환경&lt;/strong&gt;&lt;/span&gt;&lt;/p&gt; &lt;ul&gt; &lt;li&gt; &lt;p&gt;&lt;span style=&quot;font-size:24px;&quot;&gt;까치산공원, 삼일공원, 반포한강시민공원 등 녹지 공간이 가까움&lt;/span&gt;&lt;/p&gt; &lt;/li&gt; &lt;/ul&gt; &lt;hr /&gt; &lt;h2&gt;&lt;span style=&quot;font-size:24px;&quot;&gt;참고사항&lt;/span&gt;&lt;/h2&gt; &lt;p&gt;&lt;span style=&quot;font-size:24px;&quot;&gt;✅ 모델하우스 방문 전에 &lt;strong&gt;사전예약 또는 전화 상담&lt;/strong&gt;을 통해 운영 시간, 위치 및 상담 가능 여부를 확인하는 것을 권장합니다.&lt;/span&gt;&lt;/p&gt; &lt;p&gt;&nbsp;&lt;/p&gt; &lt;p&gt;&lt;span style=&quot;font-size:24px;&quot;&gt;✅ 지역주택조합 방식의 프로젝트는 사업 진행 속도 및 조건이 일반 분양과 다를 수 있으므로, &lt;strong&gt;계약 전 전문가 상담 및 조합 공지 자료 확인&lt;/strong&gt;이 중요합니다.&lt;/span&gt;&lt;/p&gt;&lt;/div&gt; ]]>"
              - generic [ref=e827]: </description>
